name: Build YTLite from source

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "Direct URL to the decrypted YouTube IPA"
        required: true
        type: string
      display_name:
        description: "App display name"
        default: "YouTube"
        required: true
        type: string
      bundle_id:
        description: "Bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string

jobs:
  build:
    name: Build from source + inject
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout YTLite source
        uses: actions/checkout@v4
        with:
          path: main

      - name: Install dependencies
        run: brew install make ldid dpkg

      - name: Set environment
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mkdir -p $THEOS/sdks
          mv *.sdk $THEOS/sdks

      - name: Clone YouTubeHeader + PSHeader
        run: |
          mkdir -p $THEOS/include
          cd $THEOS/include
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          # YTLite's YouTubeHeaders.h imports "../YouTubeHeader/..." (relative), expecting these as
          # SIBLINGS of the source dir (main/). Expose them at the workspace root too.
          cp -r YouTubeHeader "${{ github.workspace }}/YouTubeHeader"
          cp -r PSHeader "${{ github.workspace }}/PSHeader"

      - name: Provide protobuf ObjC headers (needed by YTNativeShare.x)
        run: |
          # YTNativeShare.x imports "../protobuf/objectivec/...", relative to the source root (main/).
          # So protobuf must sit as a sibling of main/ at the workspace root.
          # Pin to v25.3: protobuf's main branch REMOVED GPBUnknownFieldSet.h (which YTNativeShare.x
          # needs). v25.3 still ships all the ObjC headers the source imports.
          git clone --quiet -n --depth=1 --filter=tree:0 --branch v25.3 https://github.com/protocolbuffers/protobuf
          cd protobuf
          git sparse-checkout set --no-cone objectivec
          git checkout
          echo "protobuf objectivec GPBUnknownFieldSet present?"; ls objectivec/GPBUnknownFieldSet.h

      - name: Provide roothide.h shim (sideload build doesn't use jbroot fallback)
        run: |
          # NSBundle+YTLite.h imports <roothide.h> only for a jbroot() fallback path that a
          # sideloaded build never reaches (the YTLite.bundle is injected into the app itself).
          # Provide a minimal identity shim so it compiles without the roothide toolchain.
          mkdir -p "$THEOS/include"
          cat > "$THEOS/include/roothide.h" <<'EOF'
          #import <Foundation/Foundation.h>
          static inline NSString *jbroot(NSString *path) { return path; }
          static inline const char *jbrootpath(const char *path) { return path; }
          EOF
          echo "wrote $THEOS/include/roothide.h"

      - name: Verify header dependencies are present
        run: |
          echo "== workspace =="; ls -la "${{ github.workspace }}"
          echo "== YouTubeHeader (sample) =="; ls "${{ github.workspace }}/YouTubeHeader" | head -n 3 || echo "MISSING YouTubeHeader"
          echo "== protobuf/objectivec (sample) =="; ls "${{ github.workspace }}/protobuf/objectivec" | head -n 5 || echo "MISSING protobuf/objectivec"

      - name: Build YTLite (.deb) from source
        run: |
          cd main
          WS="${{ github.workspace }}"
          # Relax warnings (runner clang is newer than Dan's and escalates warnings to errors),
          # and add include search dirs so the source's relative imports resolve when Theos
          # compiles .x files out of its build dir:
          #   "../YouTubeHeader/..."  ->  <WS>/main/../YouTubeHeader  = <WS>/YouTubeHeader
          #   "../protobuf/objectivec/..." -> <WS>/main/../protobuf/objectivec = <WS>/protobuf/objectivec
          FLAGS="-w -Wno-error -iquote $WS/main -I$WS/main -I$WS"
          sed -i '' 's|_CFLAGS = |_CFLAGS = -w -Wno-error |' Makefile || true
          make clean package DEBUG=0 FINALPACKAGE=1 ADDITIONAL_CFLAGS="$FLAGS" ADDITIONAL_OBJCFLAGS="$FLAGS"
          echo "=== produced packages ==="; ls -la packages
          mv packages/*.deb "${{ github.workspace }}/ytplus.deb"

      - name: Build add-on tweaks (from source)
        run: |
          set -e
          WS="${{ github.workspace }}"
          FLAGS="-w -Wno-error"
          # DontEatMyContent expects a YTHeaders copy of the YouTube headers.
          cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          build() {
            repo="$1"; url="$2"; out="$3"
            echo "::group::Building $repo"
            git clone --quiet --depth=1 "$url" "$repo"
            ( cd "$repo" && make clean package DEBUG=0 FINALPACKAGE=1 ADDITIONAL_CFLAGS="$FLAGS" ADDITIONAL_OBJCFLAGS="$FLAGS" )
            mv "$repo"/packages/*.deb "$WS/$out"
            echo "::endgroup::"
          }
          build YTVideoOverlay https://github.com/PoomSmart/YTVideoOverlay.git ytvo.deb
          build YouGroupSettings https://github.com/PoomSmart/YouGroupSettings.git ygs.deb
          build YouPiP https://github.com/PoomSmart/YouPiP.git youpip.deb
          build YTUHD https://github.com/Tonwalter888/YTUHD.git ytuhd.deb
          build YouQuality https://github.com/PoomSmart/YouQuality.git yq.deb
          build Return-YouTube-Dislikes https://github.com/PoomSmart/Return-YouTube-Dislikes.git ryd.deb
          build DontEatMyContent https://github.com/therealFoxster/DontEatMyContent.git demc.deb
          echo "=== built add-on debs ==="; ls -la "$WS"/*.deb

      - name: Clone Open in YouTube (Safari extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension
          cd OpenYoutubeSafariExtension
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex "${{ github.workspace }}"

      - name: Download and validate IPA
        run: |
          wget "${{ github.event.inputs.ipa_url }}" --no-verbose -O youtube.ipa
          ft=$(file --mime-type -b youtube.ipa)
          if [[ "$ft" != "application/x-ios-app" && "$ft" != "application/zip" ]]; then
            echo "::error::Downloaded file is not a valid IPA (type: $ft)"; exit 1
          fi

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        run: |
          # main tweak + safari extension + every add-on .deb we built
          tweaks="ytplus.deb OpenYoutubeSafariExtension.appex"
          for f in *.deb; do
            [ -f "$f" ] && [ "$f" != "ytplus.deb" ] && tweaks="$tweaks $f"
          done
          echo "Injecting: $tweaks"
          cyan -i youtube.ipa -o YTLiteSource.ipa -uwef $tweaks -n "${{ github.event.inputs.display_name }}" -b ${{ github.event.inputs.bundle_id }}
          ls -la YTLiteSource.ipa

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: src-${{ github.run_number }}
          name: YTLite from source (${{ github.run_number }})
          files: YTLiteSource.ipa
          draft: true
